services:
  - name: med-easy-frontend
    type: web
    plan: free
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    branch: main
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
